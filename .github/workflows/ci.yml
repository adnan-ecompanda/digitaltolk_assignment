name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: translations
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: Install composer deps
        run: |
          cd backend
          composer install --no-progress --prefer-dist
      - name: Prepare DB & migrate
        run: |
          cd backend
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --seed
      - name: Run tests
        run: |
          cd backend
          # run non-performance tests first
          php artisan test --testsuite=Feature --exclude-group=performance || true
          # run perf test with smaller data
          PERF_TEST_COUNT=1000 php artisan test --filter=ExportPerformanceTest || true
