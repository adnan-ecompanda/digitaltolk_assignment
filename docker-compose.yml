version: '3.8'
services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile.app
    container_name: translation_app
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_DATABASE=translations
      - DB_USERNAME=root
      - DB_PASSWORD=secret

  db:
    image: mysql:8.0
    container_name: translation_db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: translations
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
